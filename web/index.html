    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://www.efishother.com/#website",
            "name": "efishother",
            "url": "https://www.efishother.com/",
            "inLanguage": "zh-CN",
            "description": "efishother is the home of Answer Machine, a local-first browser-side answer machine."
          },
          {
            "@type": "WebApplication",
            "@id": "https://www.efishother.com/#answer-machine",
            "name": "Answer Machine",
            "alternateName": ["another_brain", "efishother answer machine"],
            "url": "https://www.efishother.com/",
            "applicationCategory": "BrowserApplication",
            "operatingSystem": "Any modern browser",
            "isAccessibleForFree": true,
            "creator": {
              "@type": "Person",
              "name": "Dai Pan",
              "url": "https://daipan.art/"
            },
            "description": "A bounded browser-side answer machine that uses deterministic dialog rules, static knowledge cards, and a tiny route-and-answer model. It does not require an account or cloud inference.",
            "featureList": [
              "short browser-side answers",
              "bounded local conversation context",
              "static public knowledge lookup",
              "privacy-preserving no-cloud-inference runtime"
            ],
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            }
          },
          {
            "@type": "WebPage",
            "@id": "https://www.efishother.com/#webpage",
            "url": "https://www.efishother.com/",
            "name": "Answer Machine | efishother",
            "isPartOf": {
              "@id": "https://www.efishother.com/#website"
            },

              "@id": "https://www.efishother.com/#answer-machine"
            },
            "inLanguage": "zh-CN",
            "description": "The public page for Answer Machine, a minimal local-first answer interface."
          }
        ]
      }
    </script>
  </head>
  <body>
    <main class="shell" aria-label="Answer Machine" aria-describedby="siteSummary">
      <section id="siteSummary" class="sr-only">
        <h1>Answer Machine</h1>
        <p>
          Answer Machine is a local-first browser-side answer machine at efishother.com.
          It gives short bounded answers through deterministic rules, static knowledge cards,
          and a tiny route-and-answer runtime. It is not a general-purpose cloud LLM and does
          not require an account.
        </p>
      </section>
      <section class="chatbox" aria-label="Answer Machine input">
        <section id="contextPanel" class="context-panel" aria-label="Context" hidden>
          <div id="contextList" class="context-list"></div>
        </section>
        <section id="answer" class="answer" aria-live="polite" hidden></section>
        <p id="status" class="status" aria-live="polite" hidden>
          <span class="thinking-dots" aria-label="思考中">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </p>
        <form id="chatForm" class="entry" autocomplete="off">
          <label class="sr-only" for="prompt">Ask me</label>
          <textarea
            id="prompt"
            rows="1"
            placeholder="Ask me"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button
            id="contextToggle"
            class="context-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="contextPanel"
            aria-label="展开上下文"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <path d="M7 9l5-5 5 5" />
              <path d="M7 15l5 5 5-5" />
            </svg>
          </button>
        </form>
      </section>
    </main>

    <script type="module" src="./app.js?v=62"></script>
  </body>
</html>
